apiVersion: v1
kind: Secret
metadata:
  name: recipe-service-secret
  namespace: recipeapp
type: Opaque
stringData:
  SECRET_KEY: "change-me-to-a-real-secret-key"
  DB_USER: "advanced_swe_cooking_app_user"  # Render DB user — set actual password at deploy time
  DB_PASSWORD: "change-me"                  # Do not commit real password — patch with: kubectl patch secret recipe-service-secret -n recipeapp --patch '{"data":{"DB_PASSWORD":"<base64-encoded-password>"}}'
  INTERNAL_SERVICE_KEY: "change-me-to-a-real-service-key"
