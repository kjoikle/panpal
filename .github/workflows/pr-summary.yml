name: PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          DIFF=$(head -c 20000 pr.diff)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Request summary from OpenAI
        id: llm
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg body "$PR_BODY" \
            --arg diff "$DIFF" \
            '{
              model: "gpt-4o",
              max_tokens: 1024,
              messages: [{
                role: "user",
                content: ("You are a code reviewer. Summarize the following pull request for other developers.\n\nPR Title: " + $title + "\n\nPR Description:\n" + $body + "\n\nDiff:\n```\n" + $diff + "\n```\n\nProvide a concise summary covering:\n1. **What changed** — the key modifications\n2. **Why it matters** — purpose or motivation\n3. **Areas to review** — any notable risks, design decisions, or places that deserve extra attention\n\nKeep it brief and developer-focused.")
              }]
            }')

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is not set — skipping summary."
            exit 0
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "OpenAI API returned HTTP $HTTP_CODE:"
            echo "$BODY"
            exit 1
          fi

          SUMMARY=$(echo "$BODY" | jq -r '.choices[0].message.content')
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post summary comment
        env:
          GH_TOKEN: ${{ github.token }}
          SUMMARY: ${{ steps.llm.outputs.summary }}
        run: |
          COMMENT="## AI PR Summary\n\n${SUMMARY}\n\n---\n*Generated by GPT-4o. Always review the full diff.*"
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$(printf '%b' "$COMMENT")"
